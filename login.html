<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080b1a">
<title>Sign In — CivicByte</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 34 34'%3E%3Crect x='2' y='2' width='30' height='30' rx='9' fill='%23080b1a' stroke='%2300f5c4' stroke-width='1.5'/%3E%3Crect x='9' y='18' width='3.5' height='8' rx='1.2' fill='%2300f5c4'/%3E%3Crect x='15.25' y='13' width='3.5' height='13' rx='1.2' fill='%2300f5c4' opacity='.7'/%3E%3Crect x='21.5' y='8' width='3.5' height='18' rx='1.2' fill='%2300f5c4' opacity='.5'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
<style>
body { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
<div class="auth-bg">
  <div class="auth-card">
    <a href="/" class="auth-logo">
      <svg width="26" height="26" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="lgL" x1="4" y1="4" x2="30" y2="30" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#00f5c4"/><stop offset="100%" stop-color="#b197fc"/></linearGradient></defs>
        <rect x="2" y="2" width="30" height="30" rx="9" fill="rgba(0,245,196,0.07)" stroke="url(#lgL)" stroke-width="1.5"/>
        <rect x="9" y="18" width="3.5" height="8" rx="1.2" fill="url(#lgL)"/>
        <rect x="15.25" y="13" width="3.5" height="13" rx="1.2" fill="url(#lgL)" opacity="0.75"/>
        <rect x="21.5" y="8" width="3.5" height="18" rx="1.2" fill="url(#lgL)" opacity="0.5"/>
      </svg>civic<span class="cb">byte</span>
    </a>

    <div class="auth-loading" id="authLoading">Checking session…</div>
    <div id="authUI">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Sign In -->
      <form class="auth-form active" id="formSignIn" onsubmit="handleSignIn(event)">
        <div class="auth-error" id="errSignIn"></div>
        <div class="form-group">
          <label class="form-label" for="siEmail">Email address</label>
          <input class="form-input" type="email" id="siEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="siPassword">Password</label>
          <input class="form-input" type="password" id="siPassword" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-primary auth-submit" id="btnSignIn">Sign In &rarr;</button>
        <hr class="auth-divider">
        <p class="auth-footer-text">Forgot your password? <a href="#" onclick="handleReset(event)">Send reset email</a></p>
      </form>

      <!-- Register -->
      <form class="auth-form" id="formRegister" onsubmit="handleRegister(event)">
        <div class="auth-error" id="errRegister"></div>
        <div class="auth-success" id="successRegister"></div>
        <div class="form-group">
          <label class="form-label" for="regName">Your name</label>
          <input class="form-input" type="text" id="regName" placeholder="Jane Smith" required autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email address</label>
          <input class="form-input" type="email" id="regEmail" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Password <span style="color:var(--text-dim);font-weight:400">(min. 8 characters)</span></label>
          <input class="form-input" type="password" id="regPassword" placeholder="••••••••" minlength="8" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn-primary auth-submit" id="btnRegister">Create Account &rarr;</button>
      </form>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="/auth.js"></script>
<script>
document.getElementById('authLoading').style.display = 'block';
document.getElementById('authUI').style.display = 'none';
auth.onAuthStateChanged(function(user) {
  if (user) {
    var dest = sessionStorage.getItem('cb_redirect') || '/index.html';
    sessionStorage.removeItem('cb_redirect');
    window.location.replace(dest);
  } else {
    document.getElementById('authLoading').style.display = 'none';
    document.getElementById('authUI').style.display = 'block';
  }
});
function switchTab(tab) {
  var s = tab === 'signin';
  document.getElementById('tabSignIn').classList.toggle('active', s);
  document.getElementById('tabRegister').classList.toggle('active', !s);
  document.getElementById('formSignIn').classList.toggle('active', s);
  document.getElementById('formRegister').classList.toggle('active', !s);
}
function setLoading(id, v) { var b = document.getElementById(id); b.disabled = v; b.style.opacity = v ? '0.6' : '1'; }
function showError(id, msg) { var e = document.getElementById(id); e.textContent = msg; e.classList.add('visible'); }
function clearError(id) { var e = document.getElementById(id); e.textContent = ''; e.classList.remove('visible'); }
function handleSignIn(e) {
  e.preventDefault(); clearError('errSignIn'); setLoading('btnSignIn', true);
  auth.signInWithEmailAndPassword(document.getElementById('siEmail').value.trim(), document.getElementById('siPassword').value)
    .then(function() { var d = sessionStorage.getItem('cb_redirect')||'/index.html'; sessionStorage.removeItem('cb_redirect'); window.location.replace(d); })
    .catch(function(err) { setLoading('btnSignIn', false); showError('errSignIn', _authMsg(err.code)); });
}
function handleRegister(e) {
  e.preventDefault(); clearError('errRegister'); document.getElementById('successRegister').classList.remove('visible'); setLoading('btnRegister', true);
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pw = document.getElementById('regPassword').value;
  auth.createUserWithEmailAndPassword(email, pw)
    .then(function(c) { return c.user.updateProfile({displayName:name}).then(function(){ return createUserProfile(c.user, name); }); })
    .then(function() { var d = sessionStorage.getItem('cb_redirect')||'/index.html'; sessionStorage.removeItem('cb_redirect'); window.location.replace(d); })
    .catch(function(err) { setLoading('btnRegister', false); showError('errRegister', _authMsg(err.code)); });
}
function handleReset(e) {
  e.preventDefault();
  var email = document.getElementById('siEmail').value.trim();
  if (!email) { showError('errSignIn', 'Enter your email above first.'); return; }
  auth.sendPasswordResetEmail(email)
    .then(function() { clearError('errSignIn'); document.getElementById('siEmail').insertAdjacentHTML('afterend','<p style="color:var(--teal);font-size:.8rem;margin-top:.4rem">Reset email sent — check your inbox.</p>'); })
    .catch(function(err) { showError('errSignIn', _authMsg(err.code)); });
}
function _authMsg(code) {
  return ({'auth/user-not-found':'No account found with that email.','auth/wrong-password':'Incorrect password.','auth/email-already-in-use':'An account with this email already exists.','auth/weak-password':'Password must be at least 8 characters.','auth/invalid-email':'Please enter a valid email address.','auth/too-many-requests':'Too many attempts. Please wait and try again.','auth/network-request-failed':'Network error. Check your connection.','auth/invalid-credential':'Incorrect email or password.'})[code] || 'Something went wrong. Please try again.';
}
</script>
</body>
</html>
