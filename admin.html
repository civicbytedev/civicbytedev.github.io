<header class="page-header">
  <div class="label">Admin</div>
  <h1>Account <span class="grad">Dashboard</span></h1>
  <p>All registered CivicByte accounts. Visible only to you.</p>
</header>
<hr class="divider">

<section class="section" style="padding-top:2.5rem">
  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="statTotal">—</div>
      <div class="stat-lbl">Total accounts</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statToday">—</div>
      <div class="stat-lbl">Joined today</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="statWeek">—</div>
      <div class="stat-lbl">Joined this week</div>
    </div>
  </div>

  <!-- Search -->
  <div class="admin-search-wrap">
    <svg class="admin-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" class="admin-search" id="adminSearch" placeholder="Filter by name or email…" oninput="filterTable()" aria-label="Search users">
  </div>

  <!-- Table -->
  <div class="users-table-wrap">
    <div class="admin-loading" id="adminLoading">Loading accounts…</div>
    <div class="admin-empty" id="adminEmpty" style="display:none">No accounts found.</div>
    <table class="users-table" id="usersTable" style="display:none">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Email</th>
          <th>Joined</th>
          <th>Last Login</th>
        </tr>
      </thead>
      <tbody id="usersTableBody"></tbody>
    </table>
  </div>
</section>

<footer>

  <div class="f-right">
    <a href="#" onclick="firebase.auth().signOut().then(function(){window.location.replace('/login.html')})">Sign Out</a>
  </div>
</footer>

<script>
var allRows = [];
document.documentElement.style.visibility = 'hidden';
auth.onAuthStateChanged(function(user) {
  if (!user) { sessionStorage.setItem('cb_redirect', window.location.href); window.location.replace('/login.html'); return; }
  if (user.uid !== ADMIN_UID) { window.location.replace('/index.html'); return; }
  document.documentElement.style.visibility = 'visible';
  loadUsers(user.uid);
});
function loadUsers(adminUid) {
  db.collection('users').orderBy('createdAt','desc').get()
    .then(function(snap) {
      document.getElementById('adminLoading').style.display = 'none';
      if (snap.empty) {
        document.getElementById('adminEmpty').style.display = 'block';
        document.getElementById('statTotal').textContent = '0';
        document.getElementById('statToday').textContent = '0';
        document.getElementById('statWeek').textContent = '0';
        return;
      }
      var now = new Date();
      var todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      var weekStart  = new Date(todayStart - 6*86400000);
      var ct = 0, cw = 0;
      allRows = snap.docs.map(function(doc, i) {
        var d = doc.data();
        var created = d.createdAt ? d.createdAt.toDate() : null;
        var lastLogin = d.lastLogin ? d.lastLogin.toDate() : null;
        if (created) { if (created >= todayStart) ct++; if (created >= weekStart) cw++; }
        return { num:i+1, name:d.displayName||'—', email:d.email||'—', isAdmin:doc.id===adminUid,
                 createdStr:created?_fmtDate(created):'—', lastStr:lastLogin?_fmtDate(lastLogin):'—',
                 searchText:((d.displayName||'')+' '+(d.email||'')).toLowerCase() };
      });
      document.getElementById('statTotal').textContent = allRows.length;
      document.getElementById('statToday').textContent = ct;
      document.getElementById('statWeek').textContent  = cw;
      renderTable(allRows);
    })
    .catch(function(err) {
      document.getElementById('adminLoading').textContent = 'Error: ' + err.message;
    });
}
function renderTable(rows) {
  var tbody = document.getElementById('usersTableBody');
  tbody.innerHTML = '';
  if (!rows.length) {
    document.getElementById('usersTable').style.display = 'none';
    document.getElementById('adminEmpty').style.display = 'block';
    return;
  }
  document.getElementById('adminEmpty').style.display = 'none';
  document.getElementById('usersTable').style.display = 'table';
  rows.forEach(function(r) {
    var tr = document.createElement('tr');
    tr.innerHTML = '<td style="color:var(--text-dim);font-size:.8rem">'+r.num+'</td>'
      +'<td>'+_esc(r.name)+(r.isAdmin?'<span class="badge-admin">You</span>':'')+'</td>'
      +'<td class="user-email">'+_esc(r.email)+'</td>'
      +'<td class="user-date">'+r.createdStr+'</td>'
      +'<td class="user-date">'+r.lastStr+'</td>';
    tbody.appendChild(tr);
  });
}
function filterTable() {
  var q = document.getElementById('adminSearch').value.toLowerCase().trim();
  renderTable(q ? allRows.filter(function(r){return r.searchText.includes(q);}) : allRows);
}
function _fmtDate(d) {
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
function _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
</script>
