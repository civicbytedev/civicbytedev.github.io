name: Update School Budget Data

on:
  schedule:
    - cron: '0 7 5 * *'    # monthly — NYSED releases a new file once a year
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mdbtools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq mdbtools

      - name: Build school budget JSON from NYSED data
        run: python .github/scripts/build_school_budgets.py

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/school-budgets.json
          git diff --staged --quiet || git commit -m "Update school budget data [skip ci]"
          git push
