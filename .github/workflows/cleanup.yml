name: Branch Cleanup

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Delete stale branches
        run: |
          for b in $(git ls-remote --heads origin 'refs/heads/claude/*' | awk '{print $2}' | sed 's#refs/heads/##'); do
            echo "deleting $b"
            git push origin --delete "$b" || true
          done
